name: Build EagleLibrary

# Only runs when triggered manually from the Actions tab on GitHub.
# Go to: Actions → Build EagleLibrary → Run workflow
on:
  workflow_dispatch:
    inputs:
      build_installer:
        description: 'Also build NSIS installer (.exe)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build-windows:
    name: Windows x64 — Qt6 / MSVC 2022
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Qt 6.7 (MSVC 2022 64-bit) ───────────────────
      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v3
        with:
          version:  '6.7.3'
          host:     'windows'
          target:   'desktop'
          arch:     'win64_msvc2019_64'
          cache:    true

      # ── 3. Configure with CMake ──────────────────────────────────
      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"
          -DCMAKE_BUILD_TYPE=Release

      # ── 4. Build (Release) ───────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── 5. Deploy Qt DLLs (windeployqt) ─────────────────────────
      - name: Deploy Qt DLLs
        run: |
          "${{ env.QT_ROOT_DIR }}/bin/windeployqt.exe" `
            --no-translations `
            --compiler-runtime `
            "build/Release/EagleLibrary.exe"

      # ── 6. Copy starter plugins (if present) ─────────────────────
      - name: Copy plugins
        run: |
          if (Test-Path "plugins") {
            Copy-Item -Recurse -Force "plugins" "build/Release/plugins"
          }

      # ── 7. NSIS installer (optional) ────────────────────────────
      - name: Create NSIS installer
        if: ${{ github.event.inputs.build_installer == 'true' }}
        working-directory: build
        run: cpack -C Release -G NSIS

      # ── 8. Upload installer artifact ─────────────────────────────
      - name: Upload installer
        if: ${{ github.event.inputs.build_installer == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: EagleLibrary-Setup-x64
          path: build/*.exe
          retention-days: 30

      # ── 9. Upload portable build artifact ────────────────────────
      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: EagleLibrary-Portable-x64
          path: |
            build/Release/EagleLibrary.exe
            build/Release/*.dll
            build/Release/platforms/
            build/Release/styles/
            build/Release/imageformats/
            build/Release/iconengines/
            build/Release/plugins/
          retention-days: 30
