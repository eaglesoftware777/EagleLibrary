name: Build EagleLibrary

permissions:
  contents: write

# Triggered manually from Actions → Build EagleLibrary → Run workflow
on:
  workflow_dispatch:
    inputs:
      build_installer:
        description: 'Build NSIS installer (.exe)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      publish_release:
        description: 'Publish assets to a GitHub release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      release_tag:
        description: 'Release tag (e.g. v1.1)'
        required: false
        default: 'v1.1'
        type: string
      bust_qt_cache:
        description: 'Force re-download Qt (ignore cache)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build-windows:
    name: Windows x64 — Qt6 / MSVC 2022
    runs-on: windows-latest
    env:
      WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
      WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Qt 6.7 ──────────────────────────────────────
      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: ${{ github.event.inputs.bust_qt_cache == 'false' }}
          cache-key-prefix: 'qt-6.7.3-msvc2019-x64-v1'

      # ── 3. Expose QT_DIR for the ci-release CMake preset ───────
      - name: Set QT_DIR
        shell: pwsh
        run: |
          if (-not $env:QT_ROOT_DIR) {
            throw "QT_ROOT_DIR was not set by install-qt-action"
          }
          "QT_DIR=$env:QT_ROOT_DIR" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$env:QT_ROOT_DIR" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── 4. Clean any stale build directory ─────────────────────
      - name: Clean build directory
        shell: pwsh
        run: |
          if (Test-Path "build") {
            Remove-Item -Recurse -Force "build"
            Write-Host "Cleaned stale build/ directory"
          }

      # ── 5. Configure (ci-release preset) ───────────────────────
      - name: Configure CMake
        run: cmake --preset ci-release

      # ── 6. Build ────────────────────────────────────────────────
      - name: Build
        run: cmake --build --preset ci-release --parallel

      # ── 7. Run unit tests ──────────────────────────────────────
      - name: Run unit tests
        shell: pwsh
        run: |
          $env:PATH = "$env:QT_DIR\bin;build\Release;$env:PATH"
          ctest --test-dir build -C Release --output-on-failure

      # ── 8. Deploy Qt DLLs (windeployqt safety net) ─────────────
      # CMakeLists.txt already runs windeployqt as a POST_BUILD command.
      # This step re-runs it as a safety net in case the path differed.
      - name: Deploy Qt DLLs
        shell: pwsh
        run: |
          $qtBin = Join-Path $env:QT_DIR "bin\windeployqt.exe"
          if (-not (Test-Path $qtBin)) {
            Write-Host "windeployqt not found at $qtBin — POST_BUILD already ran it, skipping"
            exit 0
          }
          & $qtBin --no-translations --compiler-runtime "build\Release\EagleLibrary.exe"

      # ── 9. Copy plugins ────────────────────────────────────────
      - name: Copy plugins
        shell: pwsh
        run: |
          if (Test-Path "plugins") {
            Copy-Item -Recurse -Force "plugins" "build\Release\plugins"
          }

      # ── 10. Copy runtime assets ─────────────────────────────────
      - name: Copy runtime assets
        shell: pwsh
        run: |
          foreach ($pair in @(
            @{ Source = "resources\translations"; Target = "build\Release\translations" },
            @{ Source = "resources\themes";       Target = "build\Release\themes"       },
            @{ Source = "resources";              Target = "build\Release\resources"    }
          )) {
            if (Test-Path $pair.Source) {
              Copy-Item -Recurse -Force $pair.Source $pair.Target
            }
          }

      # ── 11. Sign application executable when certificate secrets exist ─────
      - name: Sign application executable
        if: ${{ env.WINDOWS_CODESIGN_CERT_BASE64 != '' && env.WINDOWS_CODESIGN_CERT_PASSWORD != '' }}
        shell: pwsh
        env:
          WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
          WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "eagle-software-codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_CERT_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }
          & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $certPath /p $env:WINDOWS_CODESIGN_CERT_PASSWORD "build\Release\EagleLibrary.exe"
          & $signtool.FullName verify /pa "build\Release\EagleLibrary.exe"

      # ── 12. Build CHM help ────────────────────────────────────
      - name: Build CHM help
        shell: pwsh
        run: |
          $hhcCandidates = @(
            "${env:ProgramFiles(x86)}\HTML Help Workshop\hhc.exe",
            "C:\Program Files (x86)\HTML Help Workshop\hhc.exe"
          )
          $hhc = $hhcCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($hhc) {
            Push-Location "docs\help"
            & $hhc "EagleLibrary.hhp"
            $hhcExit = $LASTEXITCODE
            Pop-Location
            if ($hhcExit -ne 0 -and (Test-Path "docs\help\EagleLibrary.chm")) {
              Write-Host "HTML Help Compiler returned $hhcExit after creating EagleLibrary.chm; continuing."
            } elseif ($hhcExit -ne 0) {
              throw "HTML Help Compiler failed with exit code $hhcExit"
            }
          } else {
            Write-Host "HTML Help Workshop not found on runner; using checked EagleLibrary.chm"
          }
          if (-not (Test-Path "docs\help\EagleLibrary.chm")) {
            throw "EagleLibrary.chm is missing"
          }
          $global:LASTEXITCODE = 0
          exit 0

      # ── 13. Package portable ZIP ───────────────────────────────
      - name: Package portable ZIP
        shell: pwsh
        run: |
          $portableRoot = "build\portable\EagleLibrary"
          if (Test-Path $portableRoot) {
            Remove-Item -Recurse -Force $portableRoot
          }
          New-Item -ItemType Directory -Path $portableRoot | Out-Null

          $items = @(
            "build\Release\EagleLibrary.exe",
            "build\Release\*.dll",
            "build\Release\platforms",
            "build\Release\styles",
            "build\Release\imageformats",
            "build\Release\iconengines",
            "build\Release\sqldrivers",
            "build\Release\tls",
            "build\Release\plugins",
            "build\Release\translations",
            "build\Release\themes",
            "build\Release\resources",
            "installer\README.txt",
            "installer\LICENSE.txt",
            "docs\help\EagleLibrary.chm"
          )

          foreach ($item in $items) {
            if (-not (Test-Path $item)) { continue }
            if ((Get-Item $item) -is [System.IO.DirectoryInfo]) {
              Copy-Item -Recurse -Force $item $portableRoot
            } else {
              Copy-Item -Force $item $portableRoot
            }
          }

          # portable.flag marks this as a portable installation
          New-Item -ItemType File -Path (Join-Path $portableRoot "portable.flag") -Force | Out-Null

          $zipPath = "build\EagleLibrary-Portable-x64.zip"
          if (Test-Path $zipPath) { Remove-Item -Force $zipPath }
          Compress-Archive -Path "$portableRoot\*" -DestinationPath $zipPath -CompressionLevel Optimal
          Write-Host "Portable ZIP: $zipPath ($('{0:N2}' -f ((Get-Item $zipPath).Length / 1MB)) MB)"

      # ── 14. Install NSIS ───────────────────────────────────────
      - name: Install NSIS
        if: ${{ github.event.inputs.build_installer == 'true' }}
        run: choco install nsis --no-progress -y

      # ── 15. Build NSIS installer ───────────────────────────────
      - name: Create NSIS installer
        if: ${{ github.event.inputs.build_installer == 'true' }}
        shell: pwsh
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          if (Test-Path "installer\EagleLibrary.exe") { Remove-Item -Force "installer\EagleLibrary.exe" }
          foreach ($dir in @("platforms","styles","imageformats","iconengines","sqldrivers","tls","plugins","translations","themes","resources","help","hooks")) {
            $target = Join-Path "installer" $dir
            if (Test-Path $target) { Remove-Item -Recurse -Force $target }
          }
          Copy-Item -Force "build\Release\EagleLibrary.exe" "installer\EagleLibrary.exe"
          Copy-Item -Force "build\Release\*.dll" "installer\" -ErrorAction SilentlyContinue
          foreach ($dir in @("platforms","styles","imageformats","iconengines","sqldrivers","tls","plugins","translations","themes","resources","hooks")) {
            $source = Join-Path "build\Release" $dir
            if (Test-Path $source) {
              Copy-Item -Recurse -Force $source (Join-Path "installer" $dir)
            }
          }
          New-Item -ItemType Directory -Force "installer\help" | Out-Null
          Copy-Item -Force "docs\help\EagleLibrary.chm" "installer\help\EagleLibrary.chm"
          Push-Location "installer"
          & makensis.exe "eagle_library.nsi"
          if ($LASTEXITCODE -ne 0) { throw "NSIS build failed with exit code $LASTEXITCODE" }
          Pop-Location
          Copy-Item -Force "installer\EagleLibrary_Setup_1.0.0.exe" "EagleLibrary-Setup-x64.exe"
          Write-Host "Installer: EagleLibrary-Setup-x64.exe"

      # ── 16. Sign installer when certificate secrets exist ──────
      - name: Sign installer
        if: ${{ github.event.inputs.build_installer == 'true' && env.WINDOWS_CODESIGN_CERT_BASE64 != '' && env.WINDOWS_CODESIGN_CERT_PASSWORD != '' }}
        shell: pwsh
        env:
          WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
          WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "eagle-software-codesign.pfx"
          if (-not (Test-Path $certPath)) {
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_CERT_BASE64))
          }
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }
          & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $certPath /p $env:WINDOWS_CODESIGN_CERT_PASSWORD "EagleLibrary-Setup-x64.exe"
          & $signtool.FullName verify /pa "EagleLibrary-Setup-x64.exe"

      # ── 17. Generate SHA256 checksums ──────────────────────────
      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $files = @("build\EagleLibrary-Portable-x64.zip")
          if (Test-Path "EagleLibrary-Setup-x64.exe") {
            $files += "EagleLibrary-Setup-x64.exe"
          }
          if (Test-Path "docs\help\EagleLibrary.chm") {
            $files += "docs\help\EagleLibrary.chm"
          }
          $lines = foreach ($f in $files) {
            if (Test-Path $f) {
              $hash = (Get-FileHash $f -Algorithm SHA256).Hash.ToLower()
              "$hash  $(Split-Path $f -Leaf)"
            }
          }
          $lines | Out-File -FilePath "build\SHA256SUMS.txt" -Encoding utf8
          Write-Host "--- SHA256SUMS.txt ---"
          Get-Content "build\SHA256SUMS.txt"

      # ── 18. Upload installer artifact ─────────────────────────
      - name: Upload installer artifact
        if: ${{ github.event.inputs.build_installer == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: EagleLibrary-Setup-x64
          path: EagleLibrary-Setup-x64.exe
          retention-days: 30

      # ── 19. Upload portable artifact ───────────────────────────
      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: EagleLibrary-Portable-x64
          path: build/EagleLibrary-Portable-x64.zip
          retention-days: 30

      # ── 20. Upload checksums artifact ──────────────────────────
      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: build/SHA256SUMS.txt
          retention-days: 30

      # ── 21. Upload CHM help artifact ──────────────────────────
      - name: Upload CHM help artifact
        if: ${{ hashFiles('docs/help/EagleLibrary.chm') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: EagleLibrary-CHM-Help
          path: docs/help/EagleLibrary.chm
          retention-days: 30

      # ── 22. Publish release ────────────────────────────────────
      - name: Publish release
        if: ${{ github.event.inputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "release_tag is required when publish_release=true"
          }
          if (-not $tag.StartsWith("v")) { $tag = "v$tag" }

          $version  = $tag.TrimStart("v")
          $title    = "Eagle Library $version"
          $readme   = Get-Content "README.md" -Raw

          # Extract release notes for this version from README
          $pattern  = "(?ms)^## Release Notes\s+.*?^###\s+$([regex]::Escape($version))\s*\r?\n(.*?)(?=^###\s+\S|^##\s+\S|\z)"
          $match    = [regex]::Match($readme, $pattern)
          if (-not $match.Success) {
            throw "Could not find '### $version' under '## Release Notes' in README.md"
          }
          $notesBody = $match.Groups[1].Value.Trim()

          # Build release body using simple concatenation (avoids YAML/backtick conflicts)
          $fence = '```'
          $checksumSection = ""
          if (Test-Path "build\SHA256SUMS.txt") {
            $checksumLines = (Get-Content "build\SHA256SUMS.txt") -join [System.Environment]::NewLine
            $checksumSection = [System.Environment]::NewLine + "---" + [System.Environment]::NewLine +
              [System.Environment]::NewLine + "### SHA256 Checksums" + [System.Environment]::NewLine +
              [System.Environment]::NewLine + $fence + [System.Environment]::NewLine +
              $checksumLines + [System.Environment]::NewLine + $fence + [System.Environment]::NewLine +
              [System.Environment]::NewLine + "Verify on Windows:" + [System.Environment]::NewLine +
              $fence + "powershell" + [System.Environment]::NewLine +
              "Get-FileHash EagleLibrary-Portable-x64.zip -Algorithm SHA256" + [System.Environment]::NewLine +
              $fence
          }

          $n = [System.Environment]::NewLine
          $downloadsTable = $n + "---" + $n + $n +
            "### Downloads" + $n + $n +
            "Asset | Description" + $n +
            "--- | ---" + $n +
            "**EagleLibrary-Portable-x64.zip** | Portable build — unzip and run, no install needed. portable.flag keeps all data beside the .exe." + $n +
            "**EagleLibrary-Setup-x64.exe** | Windows installer — installs to Program Files, creates Start Menu and Desktop shortcuts." + $n +
            "**EagleLibrary.chm** | Offline help — open with Windows Help Viewer (hh.exe)." + $n +
            "**SHA256SUMS.txt** | SHA256 checksums for all release assets." + $n + $n +
            "### System Requirements" + $n + $n +
            "- Windows 10 / 11 (64-bit)" + $n +
            "- No additional runtime required — Qt DLLs and MSVC redistributables are bundled" + $n

          $fullNotes = "## Eagle Library $version" + $n + $n +
            $notesBody + $n + $downloadsTable + $checksumSection

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          Set-Content -Path $notesPath -Value $fullNotes -NoNewline

          # Create or update the release
          $releaseExists = ($null -ne (gh release view $tag 2>$null))
          if (-not $releaseExists) {
            gh release create $tag --title $title --notes-file $notesPath
          } else {
            gh release edit $tag --title $title --notes-file $notesPath
          }

          # Remove existing assets before uploading fresh ones
          $existing = @(gh release view $tag --json assets --jq '.assets[].name' 2>$null)
          foreach ($assetName in @("EagleLibrary-Portable-x64.zip", "EagleLibrary-Setup-x64.exe", "EagleLibrary.chm", "SHA256SUMS.txt")) {
            if ($existing -contains $assetName) {
              gh release delete-asset $tag $assetName --yes
            }
          }

          # Upload assets
          $uploadArgs = @("release", "upload", $tag, "build\EagleLibrary-Portable-x64.zip", "build\SHA256SUMS.txt")
          if (Test-Path "EagleLibrary-Setup-x64.exe") {
            $uploadArgs += "EagleLibrary-Setup-x64.exe"
          }
          if (Test-Path "docs\help\EagleLibrary.chm") {
            $uploadArgs += "docs\help\EagleLibrary.chm"
          }
          & gh @uploadArgs
